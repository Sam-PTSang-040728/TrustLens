name: Docs CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            docs/**/*.md
            README.md
